services:
  # A Static web service on Render
  - type: web
    name: akajuniorpro
    env: static
    buildCommand: npm install --production=false && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
